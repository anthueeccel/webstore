name: build-test-and-deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: master
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore WebStore.slnx

    - name: Build
      run: dotnet build --configuration Release --no-restore WebStore.slnx

    # Unit Tests
    - name: Run Unit Tests
      run: dotnet test WebStore.slnx --no-build --configuration Release --verbosity normal --filter "Category=Unit"

    # Integration Tests
    - name: Run Integration Tests
      run: dotnet test WebStore.slnx --no-build --configuration Release --verbosity normal --filter "Category=Integration"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=master;Username=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};"

    # E2E Tests
    - name: Run E2E Tests
      run: dotnet test WebStore.slnx --no-build --configuration Release --verbosity normal --filter "Category=E2E"
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=master;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};"

    # Package the compiled app ready for Azure
    - name: Publish Web Project
      run: dotnet publish WebStore.slnx --configuration Release --output ./publish

    # Save the compiled app as a temporary workflow artifact
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webapp-package
        path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy on commits to main branch

    steps:    
    # FIX: Corrected action reference to download-artifact
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: webapp-package
        path: ./publish
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'webstore'
        package: ./publish
