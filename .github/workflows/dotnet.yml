# This workflow will build, test and deploy a .NET project
name: build-and-test
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: master
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}        
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v5
    - run: ls -R
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore WebStore.slnx
    - name: Build
      run: dotnet build --no-restore WebStore.slnx

    # Unit Tests
    - name: Run Unit Tests
      run: dotnet test WebStore.slnx --no-build --verbosity normal --filter "Category=Unit"

    # Integration Tests
    - name: Run Integration Tests
      run: dotnet test WebStore.slnx --no-build --verbosity normal --filter "Category=Integration"
      env:        
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=master;Username=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};"

    # E2E Tests
    - name: Run E2E Tests
      run: dotnet test WebStore.slnx --no-build --verbosity normal --filter "Category=E2E"
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=master;Username=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};"
