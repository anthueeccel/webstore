# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest    
    services:
      sql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
    
    steps:
    - uses: actions/checkout@v5
    - run: ls -R
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore WebStore.slnx
    - name: Build
      run: dotnet build --no-restore WebStore.slnx

    # Unit Tests
    - name: Run Unit Tests
      run: dotnet test WebStore.slnx --no-build --verbosity normal --filter "Category=Unit"

    # Integration Tests
    - name: Run Integration Tests
      run: dotnet test WebStore.slnx --no-build --verbosity normal --filter "Category=Integration"
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=master;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True;"

    # E2E Tests
    - name: Run E2E Tests
      run: dotnet test WebStore.slnx --no-build --verbosity normal --filter "Category=E2E"
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=master;User Id=sa;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True;"
